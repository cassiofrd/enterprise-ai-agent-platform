services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  inventory-agent:
    build:
      context: .
      dockerfile: Dockerfile.inventory
    container_name: inventory-agent
    ports:
      - "8001:8001"
    environment: &agent-env
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.0}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-3}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-60}
      REDIS_URL: redis://redis:6379/0
      CACHE_DEFAULT_TTL_SECONDS: ${CACHE_DEFAULT_TTL_SECONDS:-3600}
      CACHE_KEY_PREFIX: ${CACHE_KEY_PREFIX:-enterprise-ai-agent}
      REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS: ${REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS:-1.0}
      REDIS_SOCKET_TIMEOUT_SECONDS: ${REDIS_SOCKET_TIMEOUT_SECONDS:-1.0}
    depends_on:
      redis:
        condition: service_healthy

  supplier-agent:
    build:
      context: .
      dockerfile: Dockerfile.supplier
    container_name: supplier-agent
    ports:
      - "8002:8002"
    environment:
      <<: *agent-env
    depends_on:
      redis:
        condition: service_healthy

  supervisor:
    build:
      context: .
      dockerfile: Dockerfile.supervisor
    container_name: supervisor-agent
    ports:
      - "8000:8000"
    environment:
      <<: *agent-env
      INVENTORY_AGENT_URL: http://inventory-agent:8001/invoke
      SUPPLIER_AGENT_URL: http://supplier-agent:8002/invoke
    depends_on:
      inventory-agent:
        condition: service_started
      supplier-agent:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  redis-data:
